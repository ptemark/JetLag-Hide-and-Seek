name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref so that a fast-follow push to a PR
# branch doesn't queue up redundant runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Test & build ────────────────────────────────────────────────────────
  test:
    name: Test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      # Upload the compiled frontend so the deploy job can publish it without
      # re-running the build step.
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── 2. Deploy serverless (Vercel) ─────────────────────────────────────────
  deploy-serverless:
    name: Deploy serverless (Vercel)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Download the pre-built frontend so Vercel doesn't need to build again.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy to Vercel (production)
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 3. Deploy managed game server (Docker → GHCR) ─────────────────────────
  deploy-server:
    name: Deploy managed game server
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/game-server
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Platform-agnostic redeploy: POST to a webhook URL stored in
      # MANAGED_SERVER_DEPLOY_WEBHOOK (Railway, Render, Fly.io, etc.).
      # Leave the secret empty to skip this step.
      - name: Trigger managed server redeploy
        if: ${{ secrets.MANAGED_SERVER_DEPLOY_WEBHOOK != '' }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.MANAGED_SERVER_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"image":"ghcr.io/${{ github.repository }}/game-server:latest"}'
