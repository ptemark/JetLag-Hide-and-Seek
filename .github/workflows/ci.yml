name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref so that a fast-follow push to a PR
# branch doesn't queue up redundant runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Test & build ────────────────────────────────────────────────────────
  test:
    name: Test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      # Always upload so both staging and production deploy jobs can use the
      # pre-built artifact without re-running the build step.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── 2. Deploy staging serverless (Vercel preview) ─────────────────────────
  deploy-staging-serverless:
    name: Deploy staging serverless (Vercel preview)
    needs: test
    runs-on: ubuntu-latest
    outputs:
      staging_url: ${{ steps.deploy.outputs.staging_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # Deploy a Vercel preview (no --prod flag) and capture the preview URL.
      # The URL is passed to the smoke-test job via job outputs.
      # Skips gracefully when VERCEL_TOKEN secret is not configured.
      - name: Deploy to Vercel (staging preview)
        id: deploy
        run: |
          # Skip gracefully when Vercel credentials are not configured.
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping Vercel staging deploy."
            echo "staging_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Disable exit-on-error so we can always print the output before failing
          set +e
          DEPLOY_OUTPUT=$(npx vercel --token="$VERCEL_TOKEN" --yes 2>&1)
          VERCEL_EXIT=$?
          set -e
          echo "$DEPLOY_OUTPUT"
          if [ $VERCEL_EXIT -ne 0 ]; then
            echo "ERROR: Vercel deploy exited with code $VERCEL_EXIT"
            exit 1
          fi
          # Strip ANSI escape codes, then extract only the URL (grep -o returns match only)
          STAGING_URL=$(echo "$DEPLOY_OUTPUT" \
            | sed 's/\x1B\[[0-9;]*[A-Za-z]//g' \
            | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' \
            | tail -1)
          if [ -z "$STAGING_URL" ]; then
            echo "ERROR: Could not extract a vercel.app URL from deploy output"
            exit 1
          fi
          echo "staging_url=$STAGING_URL" >> "$GITHUB_OUTPUT"
          echo "Staging preview URL: $STAGING_URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 3. Deploy staging managed game server (Docker → GHCR) ─────────────────
  deploy-staging-server:
    name: Deploy staging managed game server
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # required to push to ghcr.io
      actions: write   # required for type=gha cache backend

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/game-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push under the 'staging' tag (distinct from 'latest' used by production).
      - name: Build and push Docker image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:staging

      # Redeploy the staging server via its own webhook secret.
      # Leave STAGING_MANAGED_SERVER_DEPLOY_WEBHOOK empty to skip.
      - name: Trigger staging server redeploy
        if: env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.STAGING_MANAGED_SERVER_DEPLOY_WEBHOOK }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.STAGING_MANAGED_SERVER_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${IMAGE}:staging\"}"

  # ── 4. Smoke-test staging ──────────────────────────────────────────────────
  smoke-test:
    name: Smoke-test staging
    needs: [deploy-staging-serverless, deploy-staging-server]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # SMOKE_TEST_URL comes from the Vercel preview deploy output.
      # STAGING_GAME_SERVER_URL is optional; leave the secret empty to skip
      # game-server smoke checks (e.g. when no staging server is running).
      - name: Run smoke tests against staging
        run: npm run smoke
        env:
          SMOKE_TEST_URL: ${{ needs.deploy-staging-serverless.outputs.staging_url }}
          STAGING_GAME_SERVER_URL: ${{ secrets.STAGING_GAME_SERVER_URL }}

  # ── 5. Deploy serverless (Vercel production) ───────────────────────────────
  # Production deploys only run on pushes to main AND only after staging
  # smoke tests pass, ensuring every production release is validated.
  deploy-serverless:
    name: Deploy serverless (Vercel production)
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy to Vercel (production)
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping Vercel production deploy."
            exit 0
          fi
          npx vercel --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 6. Deploy managed game server (Docker → GHCR production) ──────────────
  deploy-server:
    name: Deploy managed game server (production)
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # required to push to ghcr.io
      actions: write   # required for type=gha cache backend

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/game-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Platform-agnostic redeploy: POST to a webhook URL stored in
      # MANAGED_SERVER_DEPLOY_WEBHOOK (Railway, Render, Fly.io, etc.).
      # Leave the secret empty to skip this step.
      - name: Trigger managed server redeploy
        if: env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.MANAGED_SERVER_DEPLOY_WEBHOOK }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.MANAGED_SERVER_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${IMAGE}:latest\"}"
